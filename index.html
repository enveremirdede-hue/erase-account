<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hesap Silme TalebiV2</title>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        h2 { color: #d9534f; margin-top: 0; text-align: center; }
        .warning-box { background-color: #fff3cd; border-left: 5px solid #ffc107; padding: 15px; margin-bottom: 20px; border-radius: 4px; font-size: 14px; color: #856404; }
        .warning-box ul { margin: 5px 0 0 20px; padding: 0; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #333; font-size: 14px; }
        input[type="text"], input[type="password"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        .checkbox-group { display: flex; align-items: flex-start; gap: 10px; margin: 15px 0; font-size: 13px; color: #555; }
        .checkbox-group input { margin-top: 3px; }
        button { width: 100%; background-color: #d9534f; color: white; border: none; padding: 12px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: background 0.2s; }
        button:hover { background-color: #c9302c; }
        
        .message { padding: 12px; border-radius: 6px; margin-bottom: 20px; font-size: 14px; display: none; text-align: left; word-break: break-word; line-height: 1.4; font-weight: 500; }
        .error { background-color: #f8d7da; color: #721c24; border-left: 5px solid #dc3545; }
        .success { background-color: #d4edda; color: #155724; border-left: 5px solid #28a745; text-align: center; font-weight: bold; font-size: 16px; }
        .info { background-color: #e2e3e5; color: #383d41; border-left: 5px solid #6c757d; }
    </style>
</head>
<body>

<div class="container">
    <h2>Hesabımı Kalıcı Olarak Sil</h2>
    
    <div class="warning-box">
        <strong>⚠️ ÖNEMLİ KURUMSAL UYARI:</strong>
        <ul>
            <li>Bu işlem geri alınamaz.</li>
            <li>MailMaster üzerindeki tüm verileriniz kalıcı olarak silinecektir.</li>
        </ul>
    </div>

    <!-- Mesajlar formun yukarısında çıkacak -->
    <div id="message" class="message"></div>

    <form id="deleteForm" onsubmit="event.preventDefault(); executedelete();">
        <div class="form-group">
            <label for="nickname">Takma Adınız (Username)</label>
            <input type="text" id="nickname" placeholder="Kullanıcı adınızı girin" required autocomplete="username">
        </div>
        
        <div class="form-group">
            <label for="password">Şifreniz</label>
            <input type="password" id="password" placeholder="Şifrenizi girin" required autocomplete="current-password">
        </div>

        <div class="checkbox-group">
            <input type="checkbox" id="confirmCheck" required>
            <label for="confirmCheck">Hesabımın kalıcı olarak silinmesini onaylıyorum.</label>
        </div>

        <button type="submit">Hesabımı Kalıcı Olarak Sil</button>
    </form>
</div>

<script>
    function showMessage(text, type) {
        const messageBox = document.getElementById('message');
        messageBox.innerText = text;
        messageBox.className = "message " + type;
        messageBox.style.display = "block";
    }

    function executedelete() {
        const nickname = document.getElementById('nickname').value.trim();
        const password = document.getElementById('password').value;
        const confirmCheck = document.getElementById('confirmCheck').checked;

        if (!confirmCheck) {
            showMessage("Lütfen yukarıdaki bilgilendirmeyi onaylayın.", "error");
            return;
        }

        showMessage("Bağlantı kuruluyor...", "info");

        // 🔒 Sunucu adresiniz botlar görmesin diye Base64 ile şifrelendi
        const maskNode = "aHR0cHM6Ly9tYWlsbWFzdGVyLTYyNzg1LWRlZmF1bHQtcnRkYi5maXJlYmFzaWVvLmNvbS91c2Vycy8=";
        const targetUrl = atob(maskNode) + nickname + ".json";

        // Doğrudan REST API üzerinden Fetch kontrolü (Kütüphanesiz, donmaz)
        fetch(targetUrl)
        .then(res => {
            if (!res.ok) {
                throw new Error("Veritabanı bağlantı hatası veya erişim izni yok.");
            }
            return res.json();
        })
        .then(userData => {
            if (!userData) {
                showMessage(`Error: '${nickname}' adında bir kullanıcı veritabanında bulunamadı.`, "error");
                return;
            }

            // Şifre kelimesini otomatik tespit edici
            const dbPassword = userData.password || userData.sifre || userData.passwordText || userData.pass || userData.parola;

            if (dbPassword === undefined || dbPassword === null) {
                const alanlar = Object.keys(userData).join(', ');
                showMessage(`Error: Kullanıcı var ama şifre sütunu okunamadı. Mevcut alanlar: [${alanlar}]`, "error");
                return;
            }

            if (dbPassword.toString() === password.toString()) {
                showMessage("Şifre doğru, hesap siliniyor...", "info");

                // DELETE emriyle veriyi yok eder
                fetch(targetUrl, { method: 'DELETE' })
                .then(delRes => {
                    if (delRes.ok) {
                        showMessage("İşleminiz başarıyla gerçekleşti.", "success");
                        document.getElementById('deleteForm').reset();
                    } else {
                        showMessage("Error: Veritabanı silme talebini reddetti.", "error");
                    }
                })
                .catch(err => {
                    showMessage("Error: Silme sırasında ağ hatası: " + err.message, "error");
                });

            } else {
                showMessage("Error: Girdiğiniz şifre sistemdeki şifreyle eşleşmedi.", "error");
            }
        })
        .catch(error => {
            showMessage("Error: " + error.message, "error");
        });
    }
</script>

</body>
</html>
